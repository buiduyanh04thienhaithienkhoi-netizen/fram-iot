<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FarmNet - Quản lý sản xuất nông nghiệp</title>
    <base href="/" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Flowbite (Tailwind CSS Components) -->
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css"
      rel="stylesheet"
    />

    <!-- Blazorise Icons -->
    <link
      href="_content/Blazorise.Icons.FontAwesome/v6/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Blazorise Core + Tailwind Provider -->
    <link href="_content/Blazorise/blazorise.css?v=2.0.2.0" rel="stylesheet" />
    <link
      href="_content/Blazorise.Tailwind/blazorise.tailwind.css?v=2.0.2.0"
      rel="stylesheet"
    />

    <!-- Blazorise Sidebar Extension -->
    <link
      href="_content/Blazorise.Sidebar/blazorise.sidebar.css"
      rel="stylesheet"
    />

    <!-- App styles -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>
  <body>
    <div id="app">
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: #f0fdf4;
        "
      >
        <div style="text-align: center">
          <div
            style="
              width: 48px;
              height: 48px;
              border: 4px solid #16a34a;
              border-top-color: transparent;
              border-radius: 50%;
              animation: spin 0.8s linear infinite;
              margin: 0 auto 16px;
            "
          ></div>
          <p
            style="
              color: #15803d;
              font-family: Inter, sans-serif;
              font-size: 14px;
            "
          >
            Đang tải FarmNet...
          </p>
        </div>
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
    <!-- Flowbite JS (cần đặt trước blazor script) -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

    <script>
        window.copyToClipboard = function (text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text);
            }
            var el = document.createElement('textarea');
            el.value = text;
            el.style.position = 'fixed';
            el.style.opacity = '0';
            document.body.appendChild(el);
            el.focus();
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            return Promise.resolve();
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
  </body>
</html>
